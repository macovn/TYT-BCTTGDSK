<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Suppress Zerion wallet extension errors in iframe
      (function() {
        const originalError = console.error;
        console.error = function(...args) {
          if (args[0] && typeof args[0] === 'string' && args[0].includes('isZerion')) {
            return;
          }
          if (args[0] instanceof Error && args[0].message.includes('isZerion')) {
            return;
          }
          originalError.apply(console, args);
        };
        window.addEventListener('error', function(event) {
          if (event.message && event.message.includes('isZerion')) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
